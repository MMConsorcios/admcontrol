<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mauro Motta Consórcios — Relatório de Comissões</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:    #07090E;
    --bg2:   #0C0F18;
    --bg3:   #131824;
    --bg4:   #1A2130;
    --bd:    #1E2840;
    --bd2:   #28344E;
    --accent:       #C03020;
    --accent-bright:#D94830;
    --accent-glow:  rgba(192,48,32,0.18);
    --accent2:      #F0DDD8;
    --gold:         #C4973A;
    --gold-light:   #E0B84A;
    --gold-glow:    rgba(196,151,58,0.15);
    --warn:   #D0903A;
    --danger: #E04040;
    --success:#4AB882;
    --t1: #F0ECE6;
    --t2: #8A8078;
    --t3: #40382E;
    --titles: 'Cormorant Garamond', Georgia, serif;
    --mono:   'IBM Plex Mono', monospace;
    --body:   'Outfit', sans-serif;
    --rad: 14px;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  ::selection{background:var(--accent-glow);color:var(--accent2)}

  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:var(--bg2)}
  ::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--accent)}

  body {
    background: var(--bg);
    color: var(--t1);
    font-family: var(--body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle radial glow behind header */
  body::after {
    content: '';
    position: fixed;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 400px;
    background: radial-gradient(ellipse at center, rgba(192,48,32,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1140px;
    margin: 0 auto;
    padding: 2.5rem 2rem 5rem;
  }

  /* ═══ PAGE HEADER ═══ */
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    position: relative;
  }

  .page-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--bd) 40%, transparent 100%);
  }

  .logo-area {}

  .logo-area h1 {
    font-family: var(--titles);
    font-size: 42px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1;
    color: var(--t1);
  }

  .logo-area h1 em {
    font-style: italic;
    color: var(--accent-bright);
  }

  .logo-area h1 strong {
    font-weight: 700;
    color: var(--t1);
  }

  .logo-area .subtitle {
    font-family: var(--body);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--t3);
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-area .subtitle::before {
    content: '';
    display: inline-block;
    width: 20px;
    height: 1px;
    background: var(--accent);
  }

  .periodo-badge {
    background: linear-gradient(135deg, var(--bg3), var(--bg4));
    border: 1px solid var(--bd2);
    border-radius: 8px;
    padding: 10px 18px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  /* ═══ TABS ═══ */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 2.5rem;
    background: var(--bg2);
    border: 1px solid var(--bd);
    border-radius: 12px;
    padding: 4px;
    width: fit-content;
  }

  .tab {
    padding: 9px 22px;
    border: none;
    background: none;
    cursor: pointer;
    font-family: var(--body);
    font-size: 13px;
    font-weight: 600;
    color: var(--t3);
    border-radius: 9px;
    transition: all .2s ease;
    letter-spacing: 0.2px;
  }

  .tab:hover { color: var(--t2); background: rgba(255,255,255,0.03); }

  .tab.active {
    background: linear-gradient(135deg, var(--accent) 0%, #A02818 100%);
    color: #fff;
    box-shadow: 0 2px 12px rgba(192,48,32,0.35);
  }

  /* ═══ PANELS ═══ */
  .panel { display: none; }
  .panel.active { display: block; animation: panelIn .25s ease; }

  @keyframes panelIn {
    from { opacity:0; transform: translateY(6px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ═══ SECTION TITLES ═══ */
  .section { margin-bottom: 1.5rem; }

  .section-title {
    font-family: var(--body);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--t3);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--bd2), transparent);
  }

  /* ═══ TOTAL BAR ═══ */
  .total-bar {
    background: linear-gradient(135deg, #140A08 0%, #0C0A0B 100%);
    border: 1px solid var(--accent);
    border-radius: var(--rad);
    padding: 1.75rem 2rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    position: relative;
    overflow: hidden;
  }

  .total-bar::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: linear-gradient(180deg, var(--accent-bright), var(--accent) 60%, transparent);
  }

  .total-bar::after {
    content: '';
    position: absolute;
    right: -40px; top: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    pointer-events: none;
  }

  .total-bar .tl {
    font-family: var(--body);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--t3);
    margin-bottom: 8px;
  }

  .total-bar .tv {
    font-family: var(--mono);
    font-size: 34px;
    font-weight: 600;
    color: var(--accent-bright);
    letter-spacing: -1px;
  }

  /* ═══ COLAB GRID ═══ */
  .colab-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .colab-card {
    background: var(--bg2);
    border: 1px solid var(--bd);
    border-radius: var(--rad);
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
    animation: cardIn .3s ease both;
  }

  .colab-card:nth-child(1) { animation-delay: .04s; }
  .colab-card:nth-child(2) { animation-delay: .08s; }
  .colab-card:nth-child(3) { animation-delay: .12s; }
  .colab-card:nth-child(4) { animation-delay: .16s; }
  .colab-card:nth-child(5) { animation-delay: .20s; }
  .colab-card:nth-child(6) { animation-delay: .24s; }

  @keyframes cardIn {
    from { opacity:0; transform: translateY(12px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .colab-card:hover {
    border-color: var(--bd2);
    box-shadow: 0 4px 24px rgba(0,0,0,0.35), 0 0 0 1px rgba(196,151,58,0.06);
  }

  .colab-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--bd);
    background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%);
  }

  .colab-card-header .cn {
    font-family: var(--titles);
    font-size: 19px;
    font-weight: 600;
    color: var(--t1);
    letter-spacing: 0.1px;
  }

  .colab-card-header .cs {
    font-family: var(--body);
    font-size: 11px;
    color: var(--t3);
    margin-top: 3px;
    font-weight: 500;
  }

  .colab-card-header .ct {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    color: var(--success);
    text-align: right;
    letter-spacing: -0.5px;
  }

  .colab-card-header .cf {
    font-family: var(--body);
    font-size: 10px;
    color: var(--t3);
    text-align: right;
    margin-top: 3px;
    font-weight: 500;
  }

  .parcelas-row {
    display: flex;
    gap: 6px;
    padding: 10px 1.5rem;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--bd);
    background: rgba(0,0,0,0.15);
  }

  .parc-item {
    background: var(--bg3);
    border: 1px solid var(--bd);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-family: var(--body);
    font-weight: 500;
  }

  .parc-item span { color: var(--t3); }
  .parc-item strong { color: var(--t1); font-family: var(--mono); }

  details { padding: 0; }

  summary {
    padding: 9px 1.5rem;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent-bright);
    cursor: pointer;
    font-family: var(--body);
    list-style: none;
    letter-spacing: 0.3px;
    transition: color .15s;
    border-top: 1px solid transparent;
  }

  summary:hover { color: var(--accent2); }
  summary::-webkit-details-marker { display: none; }
  summary::before { content: '▸  '; }
  details[open] summary::before { content: '▾  '; }

  details table td, details table th { font-size: 11px; padding: 7px 12px; }

  /* ═══ TABLES ═══ */
  .table-wrap {
    background: var(--bg2);
    border: 1px solid var(--bd);
    border-radius: var(--rad);
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }

  thead tr { background: var(--bg3); }

  th {
    padding: 11px 14px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--t3);
    font-family: var(--body);
    border-bottom: 1px solid var(--bd);
  }

  td {
    padding: 11px 14px;
    border-bottom: 1px solid rgba(30,40,64,0.5);
    color: var(--t1);
    font-family: var(--body);
    font-size: 12px;
    vertical-align: middle;
  }

  tbody tr:last-child td { border-bottom: none; }

  tbody tr { transition: background .12s; }
  tbody tr:hover { background: rgba(192,48,32,0.04); }

  /* Mono for currency cells */
  td[style*="color:var(--accent-bright)"],
  td[style*="color:var(--success)"],
  td[style*="color:var(--danger)"] {
    font-family: var(--mono);
  }

  /* ═══ BADGES ═══ */
  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 5px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    font-family: var(--body);
  }

  .badge.ok {
    background: rgba(74,184,130,.1);
    color: var(--success);
    border: 1px solid rgba(74,184,130,.2);
  }

  .pending-badge {
    background: rgba(208,144,58,.1);
    color: var(--warn);
    border-radius: 5px;
    padding: 3px 9px;
    font-size: 10px;
    font-family: var(--body);
    font-weight: 700;
    border: 1px solid rgba(208,144,58,.2);
  }

  /* ═══ FECHAMENTO TOTALS ═══ */
  .fech-totals-bar {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }

  .ft-card {
    background: var(--bg2);
    border: 1px solid var(--bd);
    border-radius: var(--rad);
    padding: 1.25rem 1.5rem;
    position: relative;
    overflow: hidden;
    transition: border-color .2s;
  }

  .ft-card:hover { border-color: var(--bd2); }

  .ft-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--ft-accent, var(--bd2));
  }

  .ft-card .ft-l {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--t3);
    font-family: var(--body);
    margin-bottom: 8px;
  }

  .ft-card .ft-v {
    font-family: var(--mono);
    font-size: 21px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  /* ═══ SUBTABS ═══ */
  .subtabs {
    display: flex;
    gap: 6px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .subtab {
    padding: 7px 16px;
    border: 1px solid var(--bd);
    background: var(--bg2);
    cursor: pointer;
    font-family: var(--body);
    font-size: 11px;
    font-weight: 600;
    color: var(--t3);
    border-radius: 8px;
    transition: all .15s;
    letter-spacing: 0.2px;
  }

  .subtab:hover { color: var(--t2); border-color: var(--bd2); }

  .subtab.active {
    background: var(--bg3);
    color: var(--accent2);
    border-color: var(--accent);
    box-shadow: 0 0 0 1px rgba(192,48,32,0.15);
  }

  .subpanel { display: none; }
  .subpanel.active { display: block; }

  /* ═══ FECHAMENTO SECTIONS ═══ */
  .fech-section { margin-top: 2.5rem; }

  .fech-section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .fech-section-header h3 {
    font-family: var(--titles);
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.1px;
  }

  .pill {
    font-size: 10px;
    font-family: var(--body);
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .pill.estorno {
    background: rgba(224,64,64,.1);
    color: var(--danger);
    border: 1px solid rgba(224,64,64,.2);
  }

  .pill.contemplacao {
    background: rgba(208,144,58,.1);
    color: var(--warn);
    border: 1px solid rgba(208,144,58,.2);
  }

  /* ═══ CONFIG ═══ */
  .cfg-box {
    background: var(--bg2);
    border: 1px solid var(--bd);
    border-radius: var(--rad);
    padding: 1.75rem 2rem;
  }

  .cfg-box h4 {
    font-family: var(--titles);
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--t1);
  }

  .cfg-box p {
    font-size: 12px;
    color: var(--t2);
    margin-bottom: 1.5rem;
    font-family: var(--body);
    font-weight: 400;
    line-height: 1.6;
  }

  input[type=number] {
    width: 64px;
    background: var(--bg3);
    border: 1px solid var(--bd);
    border-radius: 6px;
    color: var(--t1);
    padding: 5px 8px;
    font-family: var(--mono);
    font-size: 12px;
    transition: border-color .15s;
  }

  input[type=number]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  /* ═══ DESPESAS ═══ */
  .desp-summary {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 14px;
    margin-bottom: 2rem;
  }

  .desp-card {
    border-radius: var(--rad);
    padding: 1.5rem;
    border: 1px solid var(--bd);
    background: var(--bg2);
    position: relative;
    overflow: hidden;
    transition: border-color .2s;
  }

  .desp-card:hover { border-color: var(--bd2); }

  .desp-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-color, var(--accent));
  }

  .desp-card .dc-l {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--t3);
    font-family: var(--body);
    margin-bottom: 8px;
  }

  .desp-card .dc-v {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  /* ═══ RESPONSIVE ═══ */
  @media(max-width:780px) {
    .wrap { padding: 1.25rem 1rem 3.5rem; }
    .page-header { flex-direction:column; align-items:flex-start; gap:14px; }
    .logo-area h1 { font-size: 30px; }
    .tabs { width:100%; flex-wrap:wrap; gap:3px; }
    .tab { flex:1 1 calc(50% - 3px); text-align:center; padding:8px 10px; font-size:12px; }
    .colab-grid { grid-template-columns:1fr; }
    .fech-totals-bar { grid-template-columns:1fr 1fr; }
    .desp-summary { grid-template-columns:1fr; }
    .table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .ft-card .ft-v { font-size: 17px; }
    .total-bar .tv { font-size: 24px; }
    .colab-card-header .ct { font-size:17px; }
    .subtabs { overflow-x:auto; -webkit-overflow-scrolling:touch; flex-wrap:nowrap; padding-bottom:4px; }
    .subtab { white-space:nowrap; flex-shrink:0; }
    .cfg-box { overflow-x:auto; }
    .cfg-box table { min-width:480px; }
    input[type=number] { width:52px; }
    .subpanel table,.fech-section table,.table-wrap table { min-width:480px; }
    details thead { display:none; }
    details tbody tr {
      display:flex; flex-direction:column;
      background:var(--bg3) !important;
      border-radius:8px; margin:6px 8px; padding:8px 10px; gap:3px;
      border:1px solid var(--bd);
    }
    details tbody td {
      display:flex; justify-content:space-between; align-items:center;
      border:none !important; padding:2px 0; font-size:11px;
    }
    details tbody td::before {
      content: attr(data-label);
      font-size:10px; font-weight:700; text-transform:uppercase;
      letter-spacing:1px; color:var(--t3); font-family:var(--body);
      flex-shrink:0; margin-right:6px; white-space:nowrap;
    }
  }
  @media(max-width:480px) {
    .fech-totals-bar { grid-template-columns:1fr; }
    .tab { flex:1 1 100%; }
    .colab-card-header { flex-direction:column; gap:6px; }
    .colab-card-header .ct { font-size:20px; text-align:left; }
    .logo-area h1 { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="page-header">
    <div class="logo-area">
      <h1><strong>Mauro Motta</strong> <em>Consórcios</em></h1>
      <p class="subtitle">Relatório de Comissões · Maio 2026</p>
    </div>
    <div class="periodo-badge" id="periodo-display"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('comissoes',this)">Comissões da Equipe</button>
    <button class="tab" onclick="showTab('fechamento',this)">Fechamento</button>
    <button class="tab" onclick="showTab('despesas',this)" style="display:none">Despesas</button>
    <button class="tab" onclick="showTab('config',this)" style="display:none">Configurações</button>
  </div>

  <div id="tab-comissoes"  class="panel active"></div>
  <div id="tab-fechamento" class="panel"></div>
  <div id="tab-despesas"   class="panel"></div>
  <div id="tab-config"     class="panel"></div>
</div>
<script>
const PERIODO="26/04/2026 – 25/05/2026";
const BONIFICACAO=720.00;
const VALOR_NOTA=27959.59;
const ADM=[
  // Parcela 1
  {p:1,gc:"835-41",nome:"Eduardo Moreira Palma",colab:"Régis",vc:63120.96},
  {p:1,gc:"840-2064",nome:"Juarez Rodrigues de Freitas",colab:"Ivana",vc:35732.68},
  {p:1,gc:"840-2312",nome:"Lidiane Araújo Fernandes",colab:"Ivana",vc:35732.68},
  {p:1,gc:"844-1802",nome:"Yuri Correa Madruga",colab:"Jéssica",vc:41671.16},
  {p:1,gc:"854-1902",nome:"Gustavo da Costa Veleda",colab:"Régis",vc:45000.00},

function renderComissoes(){

function renderFechamento(subTab){
  subTab=subTab||'p1';
  const pKeys=['p1','p2','p3','p4','p5'];
  const parcelas={};
  pKeys.forEach(k=>{parcelas[k]={itens:[],liquido:0};});
  const ADM_RATES={1:0.75,2:0.25,3:0.25,4:0.25,5:0.50};
  ADM.forEach(r=>{const k='p'+r.p;if(parcelas[k]){const rate=r.pct!=null?r.pct:ADM_RATES[r.p];const com=Math.round(r.vc*(rate/100)*100)/100;const item={...r,_com:com,_rate:rate};parcelas[k].itens.push(item);if(!r.ext)parcelas[k].liquido+=com;}});
  pKeys.forEach(k=>{parcelas[k].liquido=Math.round(parcelas[k].liquido*100)/100;});
  const totalComissoes=pKeys.reduce((a,k)=>a+parcelas[k].liquido,0);
  const totalEstornos=ESTORNOS.reduce((a,e)=>a+e.comissao,0);
  const totalLiquido=totalComissoes-totalEstornos+BONIFICACAO;
  let html=`<div class="fech-totals-bar">
    <div class="ft-card" style="--ft-accent:var(--accent-bright)"><div class="ft-l">Comissões brutas</div><div class="ft-v" style="color:var(--accent-bright)">${brl(totalComissoes)}</div><div style="font-size:11px;color:var(--t3);font-family:var(--body);margin-top:6px">${ADM.length} cotas</div></div>
    <div class="ft-card" style="--ft-accent:var(--danger)"><div class="ft-l">Estornos</div><div class="ft-v" style="color:var(--danger)">-${brl(totalEstornos)}</div><div style="font-size:11px;color:var(--t3);font-family:var(--body);margin-top:6px">${ESTORNOS.length} cotas</div></div>
    <div class="ft-card" style="--ft-accent:var(--gold)"><div class="ft-l">Bonificação (corretora)</div><div class="ft-v" style="color:var(--gold)">${brl(BONIFICACAO)}</div><div style="font-size:11px;color:var(--t3);font-family:var(--body);margin-top:6px">não distribuída à equipe</div></div>
    <div class="ft-card" style="border-color:var(--success);--ft-accent:var(--success)"><div class="ft-l">Comissão líquida final</div><div class="ft-v" style="color:var(--success)">${brl(totalLiquido)}</div><div style="font-size:11px;color:var(--t3);font-family:var(--body);margin-top:6px">comissões + bonif. − estornos</div></div>
  </div>`;

  html+=`</div>`;

  html+=`<div class="fech-section"><div class="fech-section-header"><h3 style="color:var(--danger)">Estornos do Período</h3><span class="pill estorno">${ESTORNOS.length} cotas · -${brl(totalEstornos)}</span></div>${ESTORNOS.length>0?`<div class="table-wrap"><table><thead><tr><th>Grupo-Cota</th><th>Consorciado</th><th>Colaborador</th><th>Valor Crédito</th><th>% ADM</th><th>Estorno</th></tr></thead><tbody>${ESTORNOS.map((e,i)=>`<tr style="${i%2===1?'background:rgba(20,24,36,0.5)':''}"><td style="font-weight:600;color:var(--danger);font-family:var(--mono);font-size:11px">${e.gc}</td><td>${e.nome}</td><td>${e.colab}</td><td style="font-family:var(--mono)">${brl(e.valor)}</td><td style="color:var(--t3);font-family:var(--mono)">${e.pct}%</td><td style="color:var(--danger);font-weight:700;font-family:var(--mono)">-${brl(e.comissao)}</td></tr>`).join("")}</tbody></table></div>`:`<p style="font-family:var(--body);font-size:12px;color:var(--success)">✓ Nenhum estorno neste período.</p>`}</div>`;

  document.getElementById("tab-fechamento").innerHTML=html;

  const totalDesp=DESPESAS.reduce((a,d)=>a+d.valor,0);
  const sobra=VALOR_NOTA-totalDesp;
  let html=`<div class="desp-summary"><div class="desp-card" style="--card-color:var(--accent)"><div class="dc-l">Valor da Nota (Comissões)</div><div class="dc-v" style="color:var(--accent-bright)">${brl(VALOR_NOTA)}</div></div><div class="desp-card" style="--card-color:#E04040"><div class="dc-l">Total Despesas</div><div class="dc-v" style="color:var(--danger)">${brl(totalDesp)}</div></div><div class="desp-card" style="--card-color:var(--success);border-color:rgba(74,184,130,.25)"><div class="dc-l">Sobra</div><div class="dc-v" style="color:var(--success)">${brl(sobra)}</div></div></div><div class="section"><div class="section-title">Lista de Despesas</div><div class="table-wrap"><table><thead><tr><th>#</th><th>Nome</th><th>Valor</th><th>Comprovante no Drive</th></tr></thead><tbody>${DESPESAS.map((d,i)=>`<tr style="${i%2===1?'background:rgba(20,24,36,0.5)':''}"><td style="color:var(--t3);font-family:var(--mono);font-size:11px">${i+1}</td><td style="font-weight:500">${d.nome}</td><td style="font-family:var(--mono)">${brl(d.valor)}</td><td>${d.drive?'<span class="badge ok">✓ OK</span>':'<span class="pending-badge">⚠ Pendente</span>'}</td></tr>`).join("")}</tbody></table></div></div>`;
  document.getElementById("tab-despesas").innerHTML=html;
}
function renderConfig(){
  const rows=Object.entries(PERC).map(([nome,cfg])=>{
    const ps=[1,2,3,4,5].map(p=>{if(cfg.especial)return`<td style="color:var(--t3);font-family:var(--body);font-size:11px">${p===1?'50% com. bruta':'—'}</td>`;return`<td><input type="number" step="0.05" min="0" max="5" value="${(cfg["p"+p]||0).toFixed(2)}" onchange="PERC['${nome}']['p${p}']=+this.value;renderComissoes()"></td>`;}).join("");
    const fixoCell=cfg.especial?`<td style="color:var(--t3)">—</td>`:`<td><input type="number" step="50" min="0" value="${cfg.fixo||0}" onchange="PERC['${nome}'].fixo=+this.value;renderComissoes()"></td>`;
    return`<tr><td style="font-weight:600">${nome}</td>${ps}${fixoCell}</tr>`;
  }).join("");
  document.getElementById("tab-config").innerHTML=`<div class="cfg-box"><h4>Percentuais de Comissão por Colaborador</h4><p>Altere os valores abaixo se os acordos mudarem. Os cálculos na aba Comissões atualizam automaticamente.</p><div style="overflow-x:auto"><table><thead><tr><th>Colaborador</th><th>P1 %</th><th>P2 %</th><th>P3 %</th><th>P4 %</th><th>P5 %</th><th>Fixo Mensal</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
document.getElementById("periodo-display").textContent=PERIODO;
renderComissoes();renderFechamento();renderDespesas();renderConfig();
</script>
</body>
</html>
