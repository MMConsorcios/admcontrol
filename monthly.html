    --warn:#E8A045;--danger:#EF4444;--success:#4CAF82;
    --t1:#F5F0EE;--t2:#B8ABA6;--t3:#5A4F4A;
    --titles:'Inter',sans-serif;
    --body:'Codec Pro','DM Sans','Nunito Sans',sans-serif;

  .wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem}
  .page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--bd)}
  .logo-area h1{font-size:28px;font-weight:800;letter-spacing:-0.5px;color:var(--t1);font-family:var(--titles)}
  .logo-area h1 span{color:var(--accent)}
  .logo-area p{font-size:13px;color:var(--t2);margin-top:4px;font-family:var(--body)}
  .periodo-badge{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:8px 16px;font-size:12px;font-family:var(--body);color:var(--accent-bright)}
  .tabs{display:flex;gap:4px;margin-bottom:2rem;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:4px;width:fit-content}
  .tab{padding:8px 20px;border:none;background:none;cursor:pointer;font-family:var(--titles);font-size:13px;font-weight:600;color:var(--t3);border-radius:7px;transition:all .15s}
  .tab:hover{color:var(--t2)}
  .tab.active{background:var(--accent);color:#fff}
  .section{margin-bottom:1.5rem}
  .section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--t3);font-family:var(--titles);margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .section-title::after{content:'';flex:1;height:1px;background:var(--bd)}
  .table-wrap{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:12px}
  thead tr{background:var(--bg3)}
  th{padding:10px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);font-family:var(--titles);border-bottom:1px solid var(--bd)}
  td{padding:10px 12px;border-bottom:1px solid rgba(42,51,71,.5);color:var(--t1);font-family:var(--body);font-size:12px}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:rgba(189,52,29,0.04)}
  .badge{display:inline-block;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.5px;font-family:var(--body)}
  .badge.ok{background:rgba(76,175,130,.12);color:var(--success)}
  .badge.imovel{background:rgba(189,52,29,.15);color:#E8806E}
  .badge.veiculo{background:rgba(245,230,226,.10);color:var(--accent2)}
  .colab-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .colab-card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
  .colab-card-header{display:flex;justify-content:space-between;align-items:flex-start;padding:1rem 1.25rem;border-bottom:1px solid var(--bd)}
  .colab-card-header .cn{font-size:15px;font-weight:700;font-family:var(--titles)}
  .colab-card-header .cs{font-size:11px;color:var(--t3);margin-top:2px;font-family:var(--body)}
  .colab-card-header .ct{font-size:20px;font-weight:700;color:var(--success);text-align:right;font-family:var(--titles)}
  .colab-card-header .cf{font-size:10px;color:var(--t3);font-family:var(--body)}
  .parcelas-row{display:flex;gap:6px;padding:10px 1.25rem;flex-wrap:wrap;border-bottom:1px solid var(--bd)}
  .parc-item{background:var(--bg3);border-radius:5px;padding:4px 10px;font-size:11px;font-family:var(--body)}
  .parc-item span{color:var(--t3)}
  .parc-item strong{color:var(--t1)}
  details{padding:0}
  summary{padding:8px 1.25rem;font-size:11px;color:var(--accent-bright);cursor:pointer;font-family:var(--body);list-style:none}
  summary::-webkit-details-marker{display:none}
  summary::before{content:'▸ '}
  details[open] summary::before{content:'▾ '}
  details table td,details table th{font-size:11px;padding:7px 12px}
  .total-bar{background:linear-gradient(135deg,#1a1210 0%,#0f0b0a 100%);border:1px solid var(--accent);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center}
  .total-bar .tl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-family:var(--titles);margin-bottom:6px}
  .total-bar .tv{font-size:30px;font-weight:800;color:var(--accent-bright);font-family:var(--titles)}
  .subtabs{display:flex;gap:4px;margin-bottom:1.25rem;flex-wrap:wrap}
  .subtab{padding:6px 14px;border:1px solid var(--bd);background:var(--bg2);cursor:pointer;font-family:var(--body);font-size:11px;font-weight:500;color:var(--t3);border-radius:6px;transition:all .15s}
  .subtab:hover{color:var(--t2);border-color:var(--accent)}
  .subtab.active{background:var(--bg3);color:var(--accent2);border-color:var(--accent)}
  .subpanel{display:none}
  .subpanel.active{display:block}
  .fech-totals-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
  .ft-card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:1rem 1.25rem}
  .ft-card .ft-l{font-size:10px;color:var(--t3);font-family:var(--titles);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .ft-card .ft-v{font-size:22px;font-weight:700;font-family:var(--titles)}
  .fech-section{margin-top:2rem}
  .fech-section-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .fech-section-header h3{font-size:13px;font-weight:700;font-family:var(--titles)}
  .pill{font-size:10px;font-family:var(--body);padding:3px 10px;border-radius:20px;font-weight:700}
  .pill.estorno{background:rgba(239,68,68,.12);color:var(--danger)}
  .pill.contemplacao{background:rgba(232,160,69,.12);color:var(--warn)}
  .cfg-box{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:1.25rem}
  .cfg-box h4{font-size:13px;font-weight:700;margin-bottom:6px;font-family:var(--titles)}
  .cfg-box p{font-size:12px;color:var(--t2);margin-bottom:1rem;font-family:var(--body)}

  input[type=number]:focus{outline:none;border-color:var(--accent)}
  .desp-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}
  .desp-card{border-radius:10px;padding:1rem 1.25rem;border:1px solid var(--bd);background:var(--bg2);position:relative;overflow:hidden}

  .desp-card .dc-l{font-size:10px;color:var(--t3);font-family:var(--titles);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .desp-card .dc-v{font-size:22px;font-weight:700;font-family:var(--titles)}

    .page-header{flex-direction:column;align-items:flex-start;gap:10px}
    .logo-area h1{font-size:22px}
    .periodo-badge{font-size:11px;padding:6px 12px}
    .tabs{width:100%;flex-wrap:wrap;gap:3px}
    .tab{flex:1 1 calc(50% - 3px);text-align:center;padding:8px 10px;font-size:12px}
    .colab-grid{grid-template-columns:1fr}
    .fech-totals-bar{grid-template-columns:1fr 1fr}
    .desp-summary{grid-template-columns:1fr}
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .ft-card .ft-v{font-size:17px}
    .total-bar .tv{font-size:22px}
    .colab-card-header .ct{font-size:16px}
    .subtabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;padding-bottom:4px}
    .subtab{white-space:nowrap;flex-shrink:0}
    .cfg-box{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .cfg-box table{min-width:480px}
    input[type=number]{width:52px}
    /* Tabelas de fechamento e despesas: rolagem horizontal */
    .subpanel table,.fech-section table,.table-wrap table{min-width:480px}
    /* Detalhes das cotas dentro de cada card de colaborador: cards */
    details thead{display:none}
    details tbody tr{
      display:flex;flex-direction:column;
      background:var(--bg3) !important;
      border-radius:8px;margin:6px 8px;padding:8px 10px;gap:3px;
      border:1px solid var(--bd)
    }
    details tbody td{
      display:flex;justify-content:space-between;align-items:center;
      border:none !important;padding:2px 0;font-size:11px
    }
    details tbody td::before{
      content:attr(data-label);
      font-size:10px;font-weight:700;text-transform:uppercase;
      letter-spacing:1px;color:var(--t3);font-family:var(--titles);
      flex-shrink:0;margin-right:6px;white-space:nowrap
    }
  }
  @media(max-width:480px){
    .fech-totals-bar{grid-template-columns:1fr}
    .tab{flex:1 1 100%}
    .colab-card-header{flex-direction:column;gap:6px}
    .colab-card-header .ct{font-size:20px;text-align:left}
  }
  .panel{display:none}
  .panel.active{display:block}
</style>
</head>

function renderComissoes(){

}
function renderFechamento(subTab){
  subTab=subTab||'p1';
  const pKeys=['p1','p2','p3','p4','p5'];
  const parcelas={};
  pKeys.forEach(k=>{parcelas[k]={itens:[],liquido:0};});
  const ADM_RATES={1:0.75,2:0.25,3:0.25,4:0.25,5:0.50};
  ADM.forEach(r=>{const k='p'+r.p;if(parcelas[k]){const rate=r.pct!=null?r.pct:ADM_RATES[r.p];const com=Math.round(r.vc*(rate/100)*100)/100;const item={...r,_com:com,_rate:rate};parcelas[k].itens.push(item);if(!r.ext)parcelas[k].liquido+=com;}});
  pKeys.forEach(k=>{parcelas[k].liquido=Math.round(parcelas[k].liquido*100)/100;});
  const totalComissoes=pKeys.reduce((a,k)=>a+parcelas[k].liquido,0);
  const totalEstornos=ESTORNOS.reduce((a,e)=>a+e.comissao,0);
  const totalLiquido=totalComissoes-totalEstornos+BONIFICACAO;
  let html=`<div class="fech-totals-bar">
    <div class="ft-card"><div class="ft-l">Comiss\u00f5es brutas</div><div class="ft-v" style="color:var(--accent-bright)">${brl(totalComissoes)}</div><div style="font-size:11px;color:var(--t3);font-family:var(--body);margin-top:4px">${ADM.length} cotas</div></div>
    <div class="ft-card"><div class="ft-l">Estornos</div><div class="ft-v" style="color:var(--danger)">-${brl(totalEstornos)}</div><div style="font-size:11px;color:var(--t3);font-family:var(--body);margin-top:4px">${ESTORNOS.length} cotas</div></div>
    <div class="ft-card"><div class="ft-l">Bonifica\u00e7\u00e3o (corretora)</div><div class="ft-v" style="color:var(--accent2)">${brl(BONIFICACAO)}</div><div style="font-size:11px;color:var(--t3);font-family:var(--body);margin-top:4px">n\u00e3o distribu\u00edda \u00e0 equipe</div></div>
    <div class="ft-card" style="border-color:var(--success)"><div class="ft-l">Comiss\u00e3o l\u00edquida final</div><div class="ft-v" style="color:var(--success)">${brl(totalLiquido)}</div><div style="font-size:11px;color:var(--t3);font-family:var(--body);margin-top:4px">comiss\u00f5es + bonif. \u2212 estornos</div></div>
  </div>`;
  html+=`<div class="subtabs">`;
  pKeys.forEach(k=>{const n=k[1];html+=`<button class="subtab ${subTab===k?'active':''}" onclick="renderFechamento('${k}')">Parcela ${n} \u00b7 ${brl(parcelas[k].liquido)}</button>`;});
  html+=`</div>`;
  const p=parcelas[subTab];const pNum=subTab[1];
  html+=`<div class="subpanel active"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="section-title" style="margin:0;flex:1">Parcela ${pNum} \u2014 ${p.itens.length} cotas</div><div style="font-family:var(--titles);font-size:13px;color:var(--accent-bright);font-weight:700">${brl(p.liquido)}</div></div><div class="table-wrap"><table><thead><tr><th>Grupo-Cota</th><th>Consorciado</th><th>Colaborador</th><th>Valor do Cr\u00e9dito</th><th>% ADM</th><th>Comiss\u00e3o Bruta</th></tr></thead><tbody>${p.itens.map((it,i)=>`<tr style="${i%2===1?'background:rgba(28,35,51,0.4)':''}"><td style="font-weight:600">${it.gc}</td><td>${it.nome}</td><td>${it.colab}</td><td>${brl(it.vc)}</td><td style="color:var(--t3)">${it._rate}%</td><td style="color:var(--accent-bright);font-weight:600">${brl(it._com)}</td></tr>`).join("")}</tbody></table></div></div>`;
  html+=`<div class="fech-section"><div class="fech-section-header"><h3 style="color:var(--danger)">Estornos do Per\u00edodo</h3><span class="pill estorno">${ESTORNOS.length} cotas \u00b7 -${brl(totalEstornos)}</span></div>${ESTORNOS.length>0?`<div class="table-wrap"><table><thead><tr><th>Grupo-Cota</th><th>Consorciado</th><th>Colaborador</th><th>Valor Cr\u00e9dito</th><th>% ADM</th><th>Estorno</th></tr></thead><tbody>${ESTORNOS.map((e,i)=>`<tr style="${i%2===1?'background:rgba(28,35,51,0.4)':''}"><td style="font-weight:600;color:var(--danger)">${e.gc}</td><td>${e.nome}</td><td>${e.colab}</td><td>${brl(e.valor)}</td><td style="color:var(--t3)">${e.pct}%</td><td style="color:var(--danger);font-weight:700">-${brl(e.comissao)}</td></tr>`).join("")}</tbody></table></div>`:`<p style="font-family:var(--body);font-size:12px;color:var(--success)">\u2713 Nenhum estorno neste per\u00edodo.</p>`}</div>`;
  html+=`<div class="fech-section"><div class="fech-section-header"><h3 style="color:var(--warn)">Contempla\u00e7\u00f5es do Per\u00edodo</h3><span class="pill contemplacao">${CONTEMPLACOES.length} cota${CONTEMPLACOES.length!==1?'s':''}</span></div>${CONTEMPLACOES.length>0?`<div class="table-wrap"><table><thead><tr><th>Grupo-Cota</th><th>Consorciado</th><th>Colaborador</th><th>Valor</th><th>Observa\u00e7\u00e3o</th></tr></thead><tbody>${CONTEMPLACOES.map(c=>`<tr><td style="font-weight:600;color:var(--warn)">${c.gc}</td><td>${c.nome}</td><td>${c.colab}</td><td>${brl(c.valor)}</td><td style="color:var(--t2)">${c.obs||'\u2014'}</td></tr>`).join("")}</tbody></table></div>`:`<p style="font-family:var(--body);font-size:12px;color:var(--t3)">Nenhuma contempla\u00e7\u00e3o registrada neste per\u00edodo.</p>`}</div>`;
  document.getElementById("tab-fechamento").innerHTML=html;
}

function renderConfig(){
  const rows=Object.entries(PERC).map(([nome,cfg])=>{
    const ps=[1,2,3,4,5].map(p=>{if(cfg.especial)return`<td style="color:var(--t3);font-family:var(--body);font-size:11px">${p===1?'50% com. bruta':'\u2014'}</td>`;return`<td><input type="number" step="0.05" min="0" max="5" value="${(cfg["p"+p]||0).toFixed(2)}" onchange="PERC['${nome}']['p${p}']=+this.value;renderComissoes()"></td>`;}).join("");
    const fixoCell=cfg.especial?`<td style="color:var(--t3)">\u2014</td>`:`<td><input type="number" step="50" min="0" value="${cfg.fixo||0}" onchange="PERC['${nome}'].fixo=+this.value;renderComissoes()"></td>`;
    return`<tr><td style="font-weight:600">${nome}</td>${ps}${fixoCell}</tr>`;

}
