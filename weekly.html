<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mauro Motta Consórcios — Controle Semanal de Vendas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Codec Pro';
    src: local('Codec Pro'), local('CodecPro');
    /* Fallback to similar geometric sans if Codec Pro is unavailable */
  }

  :root {
    --bg:      #0B0F1A;
    --bg2:     #111827;
    --bg3:     #1C2333;
    --bd:      #2A3347;
    --accent:  #bd341d;
    --accent-bright: #d9472e;
    --accent2: #F5E6E2;
    --warn:    #E8A045;
    --danger:  #EF4444;
    --success: #4CAF82;
    --t1:      #F5F0EE;
    --t2:      #B8ABA6;
    --t3:      #5A4F4A;
    --titles:  'Inter', sans-serif;
    --body:    'Codec Pro', 'DM Sans', 'Nunito Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--t1); font-family: var(--body); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* ── Header ── */
  .page-header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--bd);
  }
  .logo-area h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: var(--t1); font-family: var(--titles); }
  .logo-area h1 span { color: var(--accent); }
  .logo-area p { font-size: 13px; color: var(--t2); margin-top: 4px; font-family: var(--body); }
  .periodo-badge {
    background: var(--bg3); border: 1px solid var(--bd); border-radius: 8px;
    padding: 8px 16px; font-size: 12px; font-family: var(--body); color: var(--accent-bright);
  }

  /* ── Section title ── */
  .section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
    color: var(--t3); font-family: var(--titles); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--bd); }

  /* ── Tables ── */
  .table-wrap { background: var(--bg2); border: 1px solid var(--bd); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead tr { background: var(--bg3); }
  th { padding: 10px 12px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--t3); font-family: var(--titles); border-bottom: 1px solid var(--bd); }
  td { padding: 10px 12px; border-bottom: 1px solid rgba(42,51,71,0.5); color: var(--t1); font-family: var(--body); font-size: 12px; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(189,52,29,0.04); }

  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 3px 9px; border-radius: 5px; font-size: 11px;
    font-weight: 700; letter-spacing: 0.5px; font-family: var(--body);
  }
  .badge.ok       { background: rgba(76,175,130,0.12); color: var(--success); }
  .badge.nok      { background: rgba(239,68,68,0.15);  color: var(--danger);  }
  .badge.imovel   { background: rgba(189,52,29,0.15);  color: #E8806E;        }
  .badge.veiculo  { background: rgba(245,230,226,0.10);color: var(--accent2); }

  /* ── Semana blocks ── */
  .semanas-wrap { display: flex; flex-direction: column; gap: 16px; margin-bottom: 2rem; }
  .semana-block { background: var(--bg2); border: 1px solid var(--bd); border-radius: 12px; overflow: hidden; }
  .semana-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; background: var(--bg3); border-bottom: 1px solid var(--bd);
  }
  .semana-header .sh-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
    color: var(--accent-bright); font-family: var(--titles);
  }
  .semana-header .sh-count {
    font-size: 11px; color: var(--t3); font-family: var(--body);
  }
  .semana-empty {
    padding: 20px 16px;
    font-size: 12px; color: var(--t3); font-family: var(--body);
    font-style: italic;
  }

  /* ── Resultados ── */
  .resultados-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 1rem; }
  .res-card { background: var(--bg3); border: 1px solid var(--bd); border-radius: 8px; padding: 1rem; }
  .res-card .r-label { font-size: 10px; color: var(--t3); font-family: var(--titles); text-transform: uppercase; letter-spacing: 1px; }
  .res-card .r-val   { font-size: 20px; font-weight: 700; color: var(--accent2); margin-top: 4px; font-family: var(--titles); }
  .res-card .r-sub   { font-size: 11px; color: var(--t2); font-family: var(--body); margin-top: 3px; }

  /* ── Prospecções ── */
  .prosp-section { background: var(--bg2); border: 1px solid var(--bd); border-radius: 12px; padding: 1.25rem; }

  /* ── Accent bar on total card ── */
  .res-card.highlight { border-color: var(--accent); }
  .res-card.highlight .r-val { color: var(--accent-bright); }

  /* ── Pagamentos ── */
  .pagamentos-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
  .pag-card { background: var(--bg2); border: 1px solid var(--bd); border-radius: 12px; padding: 1.1rem 1.25rem; }
  .pag-card.highlight { border-color: var(--accent); }
  .pag-card .p-label { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: 1px; font-family: var(--titles); }
  .pag-card .p-val   { font-size: 22px; font-weight: 700; margin-top: 5px; font-family: var(--titles); line-height: 1; }
  .pag-card .p-sub   { font-size: 11px; color: var(--t2); margin-top: 4px; font-family: var(--body); }
  .pag-card .p-sub2  { font-size: 11px; color: var(--t2); margin-top: 2px; font-family: var(--body); }
  .prog-wrap { margin-top: 10px; background: var(--bg3); border-radius: 3px; height: 6px; overflow: hidden; }
  .prog-bar  { height: 100%; border-radius: 3px; }

  /* ── Scorecard ── */
  .scorecard-wrap { background: var(--bg2); border: 1px solid var(--bd); border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
  .sc-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid rgba(42,51,71,0.5); }
  .sc-row:last-child { border-bottom: none; }
  .sc-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .sc-name  { font-size: 13px; font-weight: 600; color: var(--t1); font-family: var(--body); }
  .sc-sub   { font-size: 11px; color: var(--t3); font-family: var(--body); margin-top: 2px; }
  .sc-val   { margin-left: auto; font-size: 14px; font-weight: 700; font-family: var(--titles); }

  /* ── Donuts ── */
  .donuts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  .donut-card { background: var(--bg2); border: 1px solid var(--bd); border-radius: 12px; padding: 1.1rem 1.25rem; }
  .donut-card .dc-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--t3); font-family: var(--titles); margin-bottom: 14px; }
  .donut-row { display: flex; align-items: center; gap: 16px; }
  .donut-leg { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .dl-item { display: flex; align-items: center; gap: 7px; font-size: 11px; font-family: var(--body); }
  .dl-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .dl-name { color: var(--t2); flex: 1; }
  .dl-pct  { font-weight: 700; font-size: 11px; }
  .dl-sub  { font-size: 10px; color: var(--t3); margin-left: 16px; }
  .dl-sep  { border-top: 1px solid var(--bd); margin: 4px 0; }

  /* ── Responsive ── */
  @media (max-width: 720px) {
    .page-header      { flex-direction: column; align-items: flex-start; gap: 10px; }
    .pagamentos-grid  { grid-template-columns: 1fr; }
    .donuts-grid      { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="page-header">
    <div class="logo-area">
      <h1>Mauro Motta <span>Consórcios</span></h1>
      <p>Controle semanal de vendas · Maio 2026</p>
    </div>
    <div class="periodo-badge" id="periodo-display"></div>
  </div>

  <div id="conteudo"></div>

</div>

<script>
// ── PERÍODO ─────────────────────────────────────────────────────────
const PERIODO = "26/04/2026 – 25/05/2026";

// ── TOTAL DE SEMANAS NO PERÍODO ─────────────────────────────────────
const TOTAL_SEMANAS = 4;

// ── SEMANAS VISÍVEIS (oculta semanas futuras) ────────────────────────
const SEMANAS_VISIVEIS = 2;

// ── VENDAS ──────────────────────────────────────────────────────────
const VENDAS = [
  { semana:0, data:"30/04/2026", gc:"844-1802",  nome:"Yuri Correa Madruga",                  mod:"Veículo", colab:"Jéssica", valor:41671.26,  pago:true  },
  { semana:0, data:"30/04/2026", gc:"1138-634",  nome:"Bruna Dias Ferreira",                  mod:"Imóvel",  colab:"Jéssica", valor:101666.77, pago:true  },
  { semana:2, data:"11/04/2026", gc:"835-41",    nome:"Eduardo Moreira Palma",                mod:"Veículo", colab:"Régis",   valor:31560.48,  pago:true  },
  { semana:2, data:"13/04/2026", gc:"840-2064",  nome:"Juarez Rodrigues de Freitas",          mod:"Veículo", colab:"Ivana",   valor:35732.67,  pago:false },
  { semana:2, data:"13/04/2026", gc:"858-2306",  nome:"Roseane Jaekel dos Santos Guevara",    mod:"Veículo", colab:"Ivana",   valor:90000.00,  pago:false },
  { semana:2, data:"13/04/2026", gc:"1138-490",  nome:"Rafael Arpino Silva",                  mod:"Imóvel",  colab:"Jéssica", valor:101666.77, pago:false },
  { semana:2, data:"14/04/2026", gc:"840-2312",  nome:"Lidiane Araújo Fernandes",             mod:"Veículo", colab:"Ivana",   valor:35732.67,  pago:false },
  { semana:2, data:"14/04/2026", gc:"1151-697",  nome:"Jose Rafael Prestes Machado",          mod:"Imóvel",  colab:"Ivana",   valor:106368.60, pago:true  },
];

// ── PROSPECÇÕES ─────────────────────────────────────────────────────
const PROSPECCOES = [];

/* ═══════════════════════ FIM DA ÁREA DE DADOS ═══════════════════════ */

const brl = v => (+v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const hexRgba = (hex, a) => { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; };

function render() {
  const todasSemanas = [0, ...Array.from({length: SEMANAS_VISIVEIS}, (_,i) => i+1)];

  const colabtotals = {};
  VENDAS.forEach(v => {
    if (!colabtotals[v.colab]) colabtotals[v.colab] = {cotas:0, total:0};
    colabtotals[v.colab].cotas++;
    colabtotals[v.colab].total += v.valor;
  });
  const grandTotal  = VENDAS.reduce((a,v)=>a+v.valor,0);
  const ticketMedio = VENDAS.length > 0 ? grandTotal / VENDAS.length : 0;

  // ── Blocos por semana ──
  let semanasHtml = `<div class="semanas-wrap">`;

  todasSemanas.forEach(sem => {
    const vv = VENDAS.filter(v => v.semana === sem);
    const label = sem === 0 ? "Semana 0" : `Semana ${sem}`;

    semanasHtml += `
    <div class="semana-block">
      <div class="semana-header">
        <span class="sh-label">${label}</span>
        <span class="sh-count">${vv.length > 0 ? vv.length + ' venda' + (vv.length!==1?'s':'') : 'sem vendas'}</span>
      </div>`;

    if (vv.length === 0) {
      semanasHtml += `<div class="semana-empty">Não houve vendas nesta semana.</div>`;
    } else {
      semanasHtml += `
      <table style="table-layout:fixed">
        <colgroup>
          <col style="width:90px">
          <col style="width:110px">
          <col>
          <col style="width:92px">
          <col style="width:92px">
          <col style="width:130px">
          <col style="width:120px">
        </colgroup>
        <thead>
          <tr>
            <th>Data</th><th>Grupo-Cota</th><th>Consorciado</th>
            <th style="text-align:center">Modalidade</th><th>Colaborador</th><th>Valor</th><th style="text-align:center">Pago e Assinado</th>
          </tr>
        </thead>
        <tbody>
          ${vv.map((v,i) => `
          <tr style="${i%2===1?'background:rgba(28,35,51,0.4)':''}">
            <td style="color:var(--t2)">${v.data}</td>
            <td style="font-weight:600">${v.gc}</td>
            <td>${v.nome}</td>
            <td style="text-align:center"><span class="badge ${v.mod==='Imóvel'?'imovel':'veiculo'}">${v.mod}</span></td>
            <td>${v.colab}</td>
            <td style="color:var(--accent-bright);font-weight:600">${brl(v.valor)}</td>
            <td style="text-align:center">
              ${v.pago
                ? `<span class="badge ok">✔ Sim</span>`
                : `<span class="badge nok">✘ Pendente</span>`}
            </td>
          </tr>`).join("")}
        </tbody>
      </table>`;
    }

    semanasHtml += `</div>`;
  });

  semanasHtml += `</div>`;

  // ── Resultados ──
  const sorted = Object.entries(colabtotals).sort((a,b)=>b[1].total-a[1].total);

  // Pagamentos
  const totalPago     = VENDAS.filter(v => v.pago).reduce((a,v)=>a+v.valor, 0);
  const totalPendente = VENDAS.filter(v => !v.pago).reduce((a,v)=>a+v.valor, 0);
  const cotasPagas    = VENDAS.filter(v => v.pago).length;
  const cotasPend     = VENDAS.filter(v => !v.pago).length;
  const pctPago       = grandTotal > 0 ? totalPago / grandTotal * 100 : 0;
  const pctPend       = grandTotal > 0 ? totalPendente / grandTotal * 100 : 0;

  const pagamentosHtml = `
  <div class="pagamentos-grid">
    <div class="pag-card highlight">
      <div class="p-label">Total do Período</div>
      <div class="p-val" style="color:var(--accent-bright)">${brl(grandTotal)}</div>
      <div class="p-sub">${VENDAS.length} cota${VENDAS.length!==1?'s':''} vendidas</div>
      <div class="p-sub2">Ticket médio: ${brl(ticketMedio)}</div>
    </div>
    <div class="pag-card">
      <div class="p-label">Pago e Assinado</div>
      <div class="p-val" style="color:var(--success)">${brl(totalPago)}</div>
      <div class="p-sub">${cotasPagas} cota${cotasPagas!==1?'s':''} · ${pctPago.toFixed(1)}%</div>
      <div class="prog-wrap"><div class="prog-bar" style="width:${pctPago.toFixed(1)}%;background:var(--success)"></div></div>
    </div>
    <div class="pag-card">
      <div class="p-label">Pendente</div>
      <div class="p-val" style="color:var(--danger)">${brl(totalPendente)}</div>
      <div class="p-sub">${cotasPend} cota${cotasPend!==1?'s':''} · ${pctPend.toFixed(1)}%</div>
      <div class="prog-wrap"><div class="prog-bar" style="width:${pctPend.toFixed(1)}%;background:var(--danger)"></div></div>
    </div>
  </div>`;

  // Scorecard de colaboradores
  const CORES_COLAB = { 'Ivana': '#4A90D9', 'Jéssica': '#4CAF82', 'Régis': '#E8A045' };
  const COR_DEFAULT = '#A78BFA';

  const scorecardHtml = `
  <div class="scorecard-wrap">
    ${sorted.map(([nome, d]) => {
      const imovel  = VENDAS.filter(v => v.colab === nome && v.mod === 'Imóvel').length;
      const veiculo = VENDAS.filter(v => v.colab === nome && v.mod === 'Veículo').length;
      const color   = CORES_COLAB[nome] || COR_DEFAULT;
      const avBg    = hexRgba(color, 0.15);
      const initials = nome.trim().substring(0,2).toUpperCase();
      const subParts = [`${d.cotas} cota${d.cotas!==1?'s':''}`];
      if (imovel)  subParts.push(`${imovel} Imóvel`);
      if (veiculo) subParts.push(`${veiculo} Veículo`);
      return `
      <div class="sc-row">
        <div class="sc-avatar" style="background:${avBg};border:1px solid ${color};color:${color}">${initials}</div>
        <div style="display:flex;flex-direction:column">
          <span class="sc-name">${nome}</span>
          <span class="sc-sub">${subParts.join(' · ')}</span>
        </div>
        <span class="sc-val" style="color:${color}">${brl(d.total)}</span>
      </div>`;
    }).join('')}
  </div>`;

  // Gráfico donut
  const COR_PAGO     = '#4CAF82';
  const COR_PENDENTE = '#EF4444';
  const CIRCUNFERENCIA = 2 * Math.PI * 40;

  function gerarArcos(fatias) {
    let acumulado = 0;
    return fatias.map(f => {
      const dash   = f.pct * CIRCUNFERENCIA;
      const gap    = CIRCUNFERENCIA - dash;
      const result = { ...f, dash, gap, offset: CIRCUNFERENCIA - acumulado };
      acumulado += dash;
      return result;
    });
  }

  // Donut esquerdo — vendas por colaborador
  const fatiasColab = gerarArcos(
    sorted.map(([nome, d]) => ({
      cor: CORES_COLAB[nome] || COR_DEFAULT,
      pct: grandTotal > 0 ? d.total / grandTotal : 0,
      nome,
      total: d.total,
    }))
  );

  // Donut direito — status de pagamento
  const pPago      = grandTotal > 0 ? totalPago / grandTotal : 0;
  const pPendente  = grandTotal > 0 ? totalPendente / grandTotal : 0;
  const pctPagoStr = (pPago * 100).toFixed(1).replace('.', ',') + '%';

  const fatiasPag = gerarArcos([
    { cor: COR_PAGO,     pct: pPago,     nome: 'Pago e assinado', total: totalPago,     qtd: cotasPagas },
    { cor: COR_PENDENTE, pct: pPendente, nome: 'Pendente',        total: totalPendente, qtd: cotasPend  },
  ]);

  const donutHtml = `
  <div class="donuts-grid">
    <div class="donut-card">
      <div class="dc-title">Vendas por colaborador</div>
      <div class="donut-row">
        <svg viewBox="0 0 110 110" width="110" height="110" style="flex-shrink:0">
          <circle cx="55" cy="55" r="40" fill="none" stroke="var(--bg3)" stroke-width="22"/>
          ${fatiasColab.map(f => `
          <circle cx="55" cy="55" r="40" fill="none"
            stroke="${f.cor}" stroke-width="22"
            stroke-dasharray="${f.dash.toFixed(2)} ${f.gap.toFixed(2)}"
            stroke-dashoffset="${f.offset.toFixed(2)}"
            transform="rotate(-90 55 55)"/>`).join('')}
          <text x="55" y="51" text-anchor="middle" font-size="9" fill="var(--t2)" font-family="Inter,sans-serif">Total</text>
          <text x="55" y="63" text-anchor="middle" font-size="12" font-weight="700" fill="var(--t1)" font-family="Inter,sans-serif">${VENDAS.length} cotas</text>
        </svg>
        <div class="donut-leg">
          ${fatiasColab.map(f => `
          <div class="dl-item">
            <div class="dl-dot" style="background:${f.cor}"></div>
            <span class="dl-name">${f.nome}</span>
            <span class="dl-pct" style="color:${f.cor}">${(f.pct*100).toFixed(1)}%</span>
          </div>`).join('')}
          <div class="dl-sep"></div>
          <div class="dl-sub">${brl(grandTotal)}</div>
        </div>
      </div>
    </div>
    <div class="donut-card">
      <div class="dc-title">Status de pagamento</div>
      <div class="donut-row">
        <svg viewBox="0 0 110 110" width="110" height="110" style="flex-shrink:0">
          <circle cx="55" cy="55" r="40" fill="none" stroke="var(--bg3)" stroke-width="22"/>
          ${fatiasPag.map(f => `
          <circle cx="55" cy="55" r="40" fill="none"
            stroke="${f.cor}" stroke-width="22"
            stroke-dasharray="${f.dash.toFixed(2)} ${f.gap.toFixed(2)}"
            stroke-dashoffset="${f.offset.toFixed(2)}"
            transform="rotate(-90 55 55)"/>`).join('')}
          <text x="55" y="51" text-anchor="middle" font-size="9" fill="${COR_PAGO}" font-family="Inter,sans-serif">Pago</text>
          <text x="55" y="63" text-anchor="middle" font-size="12" font-weight="700" fill="${COR_PAGO}" font-family="Inter,sans-serif">${pctPagoStr}</text>
        </svg>
        <div class="donut-leg">
          <div class="dl-item">
            <div class="dl-dot" style="background:${COR_PAGO}"></div>
            <span class="dl-name">Pago e assinado</span>
            <span class="dl-pct" style="color:${COR_PAGO}">${(pPago*100).toFixed(1)}%</span>
          </div>
          <div class="dl-sub">${brl(totalPago)} · ${cotasPagas} cota${cotasPagas!==1?'s':''}</div>
          <div class="dl-sep"></div>
          <div class="dl-item">
            <div class="dl-dot" style="background:${COR_PENDENTE}"></div>
            <span class="dl-name">Pendente</span>
            <span class="dl-pct" style="color:${COR_PENDENTE}">${(pPendente*100).toFixed(1)}%</span>
          </div>
          <div class="dl-sub">${brl(totalPendente)} · ${cotasPend} cota${cotasPend!==1?'s':''}</div>
        </div>
      </div>
    </div>
  </div>`;

  const resultadosHtml = `
  <div class="section-title">Resultados do Período</div>
  ${pagamentosHtml}
  ${scorecardHtml}
  ${donutHtml}`;

  document.getElementById("conteudo").innerHTML = semanasHtml + resultadosHtml;
}

document.getElementById("periodo-display").textContent = PERIODO;
render();
</script>
</body>
</html>
